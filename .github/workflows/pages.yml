name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare generated forest image
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import re

          site = Path('docs')
          b64_path = site / 'assets' / 'forest-dark.b64'
          jpg_path = site / 'assets' / 'forest-dark.jpg'
          html_path = site / 'index.html'

          jpg_path.parent.mkdir(parents=True, exist_ok=True)
          raw = b64_path.read_text(encoding='utf-8')
          compact = ''.join(raw.split())
          jpg_path.write_bytes(base64.b64decode(compact))

          html = html_path.read_text(encoding='utf-8')
          html = html.replace(
              '.route-bg svg { width: 100%; height: 100%; display: block; object-fit: cover; }',
              '.route-bg svg, .route-bg img { width: 100%; height: 100%; display: block; object-fit: cover; }',
          )
          html, count = re.subn(
              r"forest:\s*`<svg[\s\S]*?</svg>`",
              "forest: `<img src='assets/forest-dark.jpg' alt='Тёмный лес'>`",
              html,
              count=1,
          )
          if count != 1:
              raise RuntimeError(f'Expected to replace exactly one forest scene, replaced {count}')
          html_path.write_text(html, encoding='utf-8')
          b64_path.unlink(missing_ok=True)
          PY
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
