name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare generated images
        run: |
          mkdir -p docs/assets
          base64 -d docs/assets/forest-dark.b64 > docs/assets/forest-dark.jpg
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('docs/index.html')
          html = path.read_text(encoding='utf-8')

          html = html.replace(
              ".route-bg svg { width: 100%; height: 100%; display: block; object-fit: cover; }",
              ".route-bg svg, .route-bg img { width: 100%; height: 100%; display: block; object-fit: cover; }",
          )

          pattern = r"forest: `<svg viewBox='0 0 1600 900' preserveAspectRatio='xMidYMid slice'>.*?</svg>`"
          replacement = "forest: `<img src='assets/forest-dark.jpg' alt='Тёмный лес'>`"
          html, count = re.subn(pattern, replacement, html, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('Could not replace the dark forest scene')

          path.write_text(html, encoding='utf-8')
          PY
          rm docs/assets/forest-dark.b64
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
