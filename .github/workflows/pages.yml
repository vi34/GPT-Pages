name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Materialize generated forest image
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import re

          site = Path('docs')
          b64_path = site / 'assets' / 'forest-dark.b64'
          jpg_path = site / 'assets' / 'forest-dark.jpg'
          html_path = site / 'index.html'

          html = html_path.read_text(encoding='utf-8')
          html = html.replace(
              '.route-bg svg { width: 100%; height: 100%; display: block; object-fit: cover; }',
              '.route-bg svg, .route-bg img { width: 100%; height: 100%; display: block; object-fit: cover; }',
          )
          html = re.sub(
              r"forest:\s*`<svg[\s\S]*?</svg>`",
              "forest: `<img src='assets/forest-dark.jpg' alt='Тёмный лес'>`",
              html,
              count=1,
          )
          html_path.write_text(html, encoding='utf-8')

          if b64_path.exists():
              compact = ''.join(b64_path.read_text(encoding='utf-8').split())
              jpg_path.parent.mkdir(parents=True, exist_ok=True)
              jpg_path.write_bytes(base64.b64decode(compact))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/assets/forest-dark.jpg .github/workflows/pages.yml
          git rm -f docs/assets/forest-dark.b64 || true
          if ! git diff --cached --quiet; then
            git commit -m "Materialize generated forest image"
            git push
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
