<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT Pages Test</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
      background: radial-gradient(circle at top left, rgba(90, 120, 255, .18), transparent 38%), Canvas;
      color: CanvasText;
    }
    main {
      width: min(760px, 100%);
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 22px;
      padding: 34px;
      box-shadow: 0 18px 50px rgba(0,0,0,.08);
    }
    h1 { margin-top: 0; font-size: clamp(2rem, 6vw, 4rem); line-height: 1.05; }
    .muted { opacity: 0.72; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
  <main>
    <h1>GitHub Pages работает 🎉</h1>
    <p>Это тестовая страница из публичного репозитория <strong>vi34/GPT-Pages</strong>.</p>
    <p class="muted">Создано через ChatGPT 27 июня 2026.</p>
    <p class="muted">Ожидаемый адрес: <code>https://vi34.github.io/GPT-Pages/</code></p>
  </main>
</body>
</html>
